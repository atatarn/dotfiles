# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
# icons: https://www.nerdfonts.com/cheat-sheet

palette:
  blue: "#4B95E9"
  green: "#6cc150"
console_title_template: "{{ .UserName }}{{ if .Segments.Session.SSHSession }}@{{ .HostName }}{{ end }} {{ .PWD }}"
blocks:
  - type: prompt
    alignment: left
    segments:
      - template: "{{ if .Root }}{{ .HostName }}{{ end }}{{ if .SSHSession }}{{ .UserName }} \ueba9{{ end }} "
        foreground_templates:
          - "{{ if .Root }}lightRed{{ end }}"
          - "{{ if not .Root }}green{{ end }}"
        type: session
        style: plain
      - options:
          style: full
        alias: Path
        template: "\uf413 {{ path .Path .Location }} "
        foreground: lightBlue
        type: path
        style: plain
      - options:
          display_default: true
          display_mode: context
          fetch_version: true
          fetch_virtual_env: true
          folder_name_fallback: true
          home_enabled: true
        template: "{{ if .Venv }}\ue235 {{ .Venv }} ({{ .Full }}){{ end }} "
        foreground: white
        type: python
        style: plain
      - options:
          branch_icon: ""
          branch_max_length: 50
          commit_icon: "@"
          fetch_status: true
          fetch_upstream_icon: false
        template: "\ue65d {{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }} <cyan>{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}</>"
        foreground: lightYellow
        type: git
        style: plain
      - type: status
        style: plain
        template: ' [{{ .Code }}{{ if and (ne (reason .Code) "") (ne (reason .Code) (printf "%d" .Code)) }} {{ reason .Code }}{{ end }}]'
        foreground_templates:
          - "{{ if gt .Code 0 }}lightRed{{ end }}"
    newline: true
  - type: prompt
    alignment: right
    segments:
      - options:
          threshold: 5000
        foreground: lightCyan
        type: executiontime
        style: plain
      - foreground: p:blue
        type: time
        style: plain
  - type: prompt
    alignment: left
    segments:
      - options:
          always_enabled: true
        template: $
        type: status
        style: plain
        foreground_templates:
          - "{{ if gt .Code 0 }}lightRed{{ end }}"
          - "{{if eq .Code 0}}lightBlue{{end}}"
    newline: true
version: 3
final_space: true
